<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
    <title>Claw800 Nexa 担保</title>
    <meta name="description" content="Claw800 Nexa 担保，支持 Nexa App 内 USDT 担保交易、入金与放款。" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/nexa-escrow/style.css?v=11" />
  </head>
  <body>
    <main class="nexa-escrow-page" data-nexa-escrow-app>
      <section class="nexa-escrow-shell">
        <header class="nexa-escrow-header">
          <div class="nexa-escrow-brand">
            <div class="nexa-escrow-brand__icon" aria-hidden="true">
              <svg viewBox="0 0 64 64" class="nexa-escrow-brand__icon-svg">
                <path d="M32 8c6.7 4.5 14.4 6.8 21.5 6.8v14c0 15-8.9 24.4-21.5 28.5C19.4 53.2 10.5 43.8 10.5 28.8v-14C17.6 14.8 25.3 12.5 32 8z" fill="#fff" />
              </svg>
            </div>
            <div class="nexa-escrow-brand__title">
              <h1>Nexa</h1>
              <p>担保</p>
            </div>
          </div>
          <div class="nexa-escrow-header__identity">
            我的担保号:
            <button id="nexaEscrowHeaderCode" class="nexa-escrow-header__code is-loading" type="button"></button>
            <button id="nexaEscrowHeaderCopy" class="nexa-escrow-header__copy is-loading" type="button" aria-label="复制担保号">⧉</button>
          </div>
        </header>

        <nav class="nexa-escrow-tabs">
          <button class="nexa-escrow-tabs__item is-active" type="button" data-tab-target="create" data-i18n="tabCreate">发起担保</button>
          <button class="nexa-escrow-tabs__item nexa-escrow-tabs__item--orders" type="button" data-tab-target="orders">
            <span data-i18n="tabOrders">我的订单</span>
            <span id="nexaEscrowOrdersDot" class="nexa-escrow-tabs__dot" hidden aria-hidden="true"></span>
          </button>
          <button class="nexa-escrow-tabs__item" type="button" data-tab-target="account" data-i18n="tabAccount">账户中心</button>
        </nav>

        <section class="nexa-escrow-panel is-active" data-tab="create">
          <article id="nexaEscrowOrdersCard" class="nexa-escrow-card">
            <div class="nexa-escrow-role-toggle">
              <button id="nexaEscrowRoleSeller" class="nexa-escrow-role-toggle__item is-active" type="button" data-role="seller" data-i18n="roleSeller">我要买u
收u发货</button>
              <button id="nexaEscrowRoleBuyer" class="nexa-escrow-role-toggle__item" type="button" data-role="buyer" data-i18n="roleBuyer">我要卖u
付u买物</button>
            </div>

            <label class="nexa-escrow-field nexa-escrow-field--inline">
              <span data-i18n="amountLabel">金额 (USDT)</span>
              <input id="nexaEscrowAmountInput" class="nexa-escrow-input" type="number" min="0" step="0.01" inputmode="decimal" pattern="[0-9]*" placeholder="0.00" />
            </label>

            <label class="nexa-escrow-field nexa-escrow-field--inline">
              <span id="nexaEscrowCounterpartyLabel" data-i18n="counterpartySellerLabel">卖方担保号</span>
              <input id="nexaEscrowCounterpartyInput" class="nexa-escrow-input" type="text" placeholder="输入对方担保号，例如 n123456" data-i18n-placeholder="counterpartySellerPlaceholder" />
            </label>

            <label class="nexa-escrow-field">
              <span data-i18n="descriptionLabel">交易描述</span>
              <textarea id="nexaEscrowDescriptionInput" class="nexa-escrow-textarea" maxlength="30" placeholder="例如：购买虚拟主机服务、设计稿定金等" data-i18n-placeholder="descriptionPlaceholder"></textarea>
            </label>

            <p id="nexaEscrowFeeHint" class="nexa-escrow-fee-hint">注:最低 1U，最高 100000U，手续费0</p>
            <button id="nexaEscrowCreateButton" class="nexa-escrow-primary" type="button" data-i18n="createAndPayAction">确认发起并付款</button>
            <p id="nexaEscrowCreateStatus" class="nexa-escrow-status" hidden></p>
          </article>
        </section>

        <section class="nexa-escrow-panel nexa-escrow-panel--scrollable" data-tab="orders" hidden>
          <div id="nexaEscrowOrdersPullToRefresh" class="nexa-escrow-pull-refresh" aria-hidden="true">
            <div id="nexaEscrowOrdersPullSpinner" class="nexa-escrow-pull-refresh__spinner"></div>
          </div>
          <article id="nexaEscrowAccountCard" class="nexa-escrow-card">
            <div class="nexa-escrow-order-filters">
              <button class="nexa-escrow-order-filters__item is-active" type="button" data-order-filter="all" data-i18n="filterAll">全部</button>
              <button class="nexa-escrow-order-filters__item" type="button" data-order-filter="active" data-i18n="filterActive">进行中</button>
              <button class="nexa-escrow-order-filters__item" type="button" data-order-filter="disputed" data-i18n="filterDisputed">争议中</button>
              <button class="nexa-escrow-order-filters__item" type="button" data-order-filter="cancelled" data-i18n="filterCancelled">已取消</button>
              <button class="nexa-escrow-order-filters__item" type="button" data-order-filter="completed" data-i18n="filterCompleted">完成</button>
            </div>
            <div id="nexaEscrowOrdersList" class="nexa-escrow-orders-list"></div>
          </article>

          <article class="nexa-escrow-card nexa-escrow-order-detail" id="nexaEscrowOrderDetail" hidden>
            <div id="nexaEscrowDetailBody" class="nexa-escrow-order-detail__body"></div>
            <div id="nexaEscrowDetailProgress" class="nexa-escrow-order-progress"></div>
            <div id="nexaEscrowSafetyNotice" class="nexa-escrow-safety-card"></div>
            <div class="nexa-escrow-order-detail__actions">
              <button id="nexaEscrowInfoAction" class="nexa-escrow-secondary nexa-escrow-secondary--muted" type="button" hidden disabled>状态</button>
              <button id="nexaEscrowPrimaryAction" class="nexa-escrow-primary" type="button" hidden>主操作</button>
              <button id="nexaEscrowSecondaryAction" class="nexa-escrow-secondary" type="button" hidden>次操作</button>
            </div>
            <p id="nexaEscrowDetailStatusText" class="nexa-escrow-status" hidden></p>
          </article>
        </section>

        <section class="nexa-escrow-panel nexa-escrow-panel--scrollable" data-tab="account" hidden>
          <div id="nexaEscrowAccountPullToRefresh" class="nexa-escrow-pull-refresh" aria-hidden="true">
            <div id="nexaEscrowAccountPullSpinner" class="nexa-escrow-pull-refresh__spinner"></div>
          </div>
          <article class="nexa-escrow-card">
            <div class="nexa-escrow-account-summary">
              <div class="nexa-escrow-account-item">
                <span class="nexa-escrow-label" data-i18n="nicknameLabel">昵称</span>
                <input
                  id="nexaEscrowNicknameInput"
                  class="nexa-escrow-input nexa-escrow-account-item__nickname-input"
                  type="text"
                  maxlength="12"
                  placeholder="请输入昵称"
                  autocomplete="off"
                />
                <button id="nexaEscrowNicknameSaveBtn" class="nexa-escrow-primary nexa-escrow-account-item__save" type="button">保存</button>
                <p id="nexaEscrowNicknameHint" class="nexa-escrow-status">昵称一旦生成，无法修改</p>
              </div>
              <div class="nexa-escrow-account-wallet">
                <div class="nexa-escrow-account-wallet__meta">
                  <span class="nexa-escrow-label" data-i18n="walletLabel">钱包余额</span>
                  <strong id="nexaEscrowAccountWallet">0.00 USDT</strong>
                </div>
                <button id="nexaEscrowWithdrawBtn" class="nexa-escrow-primary nexa-escrow-account-item__action" type="button">提现</button>
              </div>
            </div>
            <div id="nexaEscrowLatestWithdrawal" class="nexa-escrow-withdrawal-record" hidden>
              <span class="nexa-escrow-label" data-i18n="latestWithdrawalLabel">最新提现记录</span>
              <div id="nexaEscrowWithdrawalList" class="nexa-escrow-withdrawal-list"></div>
              <div id="nexaEscrowWithdrawalPagination" class="nexa-escrow-withdrawal-pagination" hidden>
                <button id="nexaEscrowWithdrawalPrev" class="nexa-escrow-secondary nexa-escrow-withdrawal-pagination__button" type="button">上一页</button>
                <span id="nexaEscrowWithdrawalPageInfo" class="nexa-escrow-withdrawal-pagination__info">1 / 1</span>
                <button id="nexaEscrowWithdrawalNext" class="nexa-escrow-secondary nexa-escrow-withdrawal-pagination__button" type="button">下一页</button>
              </div>
            </div>
            <p id="nexaEscrowAccountStatus" class="nexa-escrow-status" hidden></p>
          </article>
        </section>
      </section>
    </main>

    <div id="nexaEscrowWithdrawModal" class="nexa-escrow-modal" hidden>
      <div class="nexa-escrow-modal__backdrop"></div>
      <div class="nexa-escrow-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="nexaEscrowWithdrawModalTitle">
        <p class="nexa-escrow-label">提现</p>
        <h2 id="nexaEscrowWithdrawModalTitle">输入提现金额</h2>
        <input
          id="nexaEscrowWithdrawAmountInput"
          class="nexa-escrow-input"
          type="number"
          min="0"
          step="0.01"
          inputmode="decimal"
          placeholder="0.00"
        />
        <div class="nexa-escrow-modal__actions">
          <button id="nexaEscrowWithdrawCancel" class="nexa-escrow-secondary" type="button">取消</button>
          <button id="nexaEscrowWithdrawConfirm" class="nexa-escrow-primary" type="button">确认提现</button>
        </div>
      </div>
    </div>

    <div id="nexaEscrowCodeModal" class="nexa-escrow-modal" hidden>
      <div class="nexa-escrow-modal__backdrop"></div>
      <div class="nexa-escrow-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="nexaEscrowCodeModalTitle">
        <p class="nexa-escrow-label" data-i18n="firstLoginHint">首次登录提醒</p>
        <h2 id="nexaEscrowCodeModalTitle" data-i18n="codeModalTitle">请输入昵称</h2>
        <input
          id="nexaEscrowCodeModalInput"
          class="nexa-escrow-input"
          type="text"
          maxlength="12"
          placeholder="请输入昵称"
          autocomplete="off"
        />
        <p id="nexaEscrowCodeModalHint" class="nexa-escrow-status" data-i18n="nicknameHint">昵称一旦生成，无法修改</p>
        <button id="nexaEscrowCodeModalConfirm" class="nexa-escrow-primary" type="button" data-i18n="codeModalConfirm">确定</button>
      </div>
    </div>

    <div id="nexaEscrowToast" class="nexa-escrow-toast" hidden>复制成功</div>

    <script src="/games-config.js"></script>
    <script>
      window.ClawGamesConfig?.bootstrapGamePage?.('nexa-escrow');
    </script>
    <script src="/nexa-escrow/script.js?v=11"></script>
  </body>
</html>
