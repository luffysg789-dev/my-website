<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Claw800 中国象棋在线</title>
    <meta name="description" content="Claw800 中国象棋在线，支持真钱房间、USDT 充值提现与手机实时对战。" />
    <link rel="stylesheet" href="/game-tip.css?v=20260321-01" />
    <link rel="stylesheet" href="/xiangqi/style.css?v=20260322-24" />
  </head>
  <body>
    <main class="xiangqi-page">
      <section class="xiangqi-shell">
        <section class="xiangqi-panel xiangqi-wallet-card">
          <div class="xiangqi-wallet-card__main">
            <p class="xiangqi-wallet-card__label">象棋在线余额</p>
            <div class="xiangqi-wallet-card__amount">
              <strong id="xiangqiWalletAvailable">0.00</strong>
              <span>USDT</span>
            </div>
            <div class="xiangqi-wallet-card__chips">
              <span>实时结算</span>
              <span>安全保障</span>
            </div>
          </div>
          <div class="xiangqi-wallet-card__side">
            <div class="xiangqi-wallet-card__actions">
              <button id="xiangqiDepositBtn" class="xiangqi-wallet-action xiangqi-wallet-action--primary" type="button" aria-label="充值到游戏账户">充值</button>
              <button id="xiangqiWithdrawBtn" class="xiangqi-wallet-action xiangqi-wallet-action--ghost" type="button">提现</button>
            </div>
            <button id="xiangqiLedgerBtn" class="xiangqi-wallet-action xiangqi-wallet-action--ghost xiangqi-wallet-action--ledger" type="button">资金明细</button>
          </div>
        </section>

        <section class="xiangqi-room-grid">
          <article class="xiangqi-panel xiangqi-room-card">
            <div class="xiangqi-room-card__title">
              <span class="xiangqi-room-card__icon xiangqi-room-card__icon--red">+</span>
              <h2>创建房间</h2>
            </div>
            <div class="xiangqi-create-options">
              <div class="xiangqi-option-group">
                <span class="xiangqi-option-group__label">金额:usdt</span>
                <div class="xiangqi-stake-preset-row">
                  <button class="xiangqi-stake-preset is-active" type="button" data-stake-preset="1">1</button>
                  <button class="xiangqi-stake-preset" type="button" data-stake-preset="5">5</button>
                  <button class="xiangqi-stake-preset" type="button" data-stake-preset="10">10</button>
                </div>
                <input id="xiangqiCreateStake" type="hidden" value="1" />
              </div>
              <div class="xiangqi-option-group">
                <span class="xiangqi-option-group__label">时局:分钟</span>
                <div class="xiangqi-time-preset-row">
                  <button class="xiangqi-time-preset" type="button" data-time-preset="10">10</button>
                  <button class="xiangqi-time-preset is-active" type="button" data-time-preset="15">15</button>
                  <button class="xiangqi-time-preset" type="button" data-time-preset="30">30</button>
                </div>
                <input id="xiangqiCreateTimeControl" type="hidden" value="15" />
              </div>
            </div>
            <button id="xiangqiCreateRoomBtn" class="xiangqi-room-cta" type="button">立即开局</button>
          </article>

          <article class="xiangqi-panel xiangqi-room-card">
            <div class="xiangqi-room-card__title">
              <span class="xiangqi-room-card__icon xiangqi-room-card__icon--blue">→</span>
              <h2>加入房间</h2>
            </div>
            <input id="xiangqiJoinRoomCode" class="xiangqi-room-input" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="6" placeholder="输入 6 位房间号" />
            <div id="xiangqiRoomSummary" class="xiangqi-room-summary">
              <strong>等待房间</strong>
              <p>输入房间号后即可查看本局 stake 与局时。</p>
            </div>
            <div class="xiangqi-join-actions">
              <button id="xiangqiJoinRoomBtn" class="xiangqi-room-cta xiangqi-room-cta--light" type="button">加入房间</button>
            </div>
          </article>
        </section>

        <section class="xiangqi-board-wrap">
          <div class="xiangqi-board-head">
            <div id="xiangqiTopCard" class="xiangqi-player-card xiangqi-player-card--black">
              <span id="xiangqiTopSide" class="xiangqi-side">黑方</span>
              <strong id="xiangqiTopPlayer">挑战者</strong>
              <p id="xiangqiTopTime">15:00</p>
            </div>
            <div class="xiangqi-match-pill">
              <span id="xiangqiRoomBadge">房间号: <span class="xiangqi-room-badge__value">000000</span></span>
              <span id="xiangqiMatchStake">押金 1.00 USDT</span>
            </div>
          </div>

          <div class="xiangqi-board-stage">
            <div id="xiangqiBoardOverlay" class="xiangqi-board-overlay" hidden>
              <p id="xiangqiBoardOverlayMessage" class="xiangqi-board-overlay__message">等待对手加入</p>
              <p id="xiangqiBoardOverlayDetail" class="xiangqi-board-overlay__detail" hidden></p>
              <button id="xiangqiStartMatchBtn" class="xiangqi-board-overlay__start" type="button" hidden>开始</button>
            </div>
            <section id="xiangqiBoard" class="xiangqi-board" aria-label="中国象棋棋盘"></section>
          </div>

          <div class="xiangqi-action-bar">
            <button id="xiangqiActionResignBtn" class="xiangqi-danger-btn" type="button">认输</button>
            <button id="xiangqiActionDrawBtn" class="xiangqi-secondary-btn" type="button">求和</button>
            <button id="xiangqiActionDrawRejectBtn" class="xiangqi-secondary-btn" type="button" hidden>拒绝求和</button>
            <button id="xiangqiActionCopyRoomBtn" class="xiangqi-secondary-btn" type="button">复制房号</button>
            <button id="xiangqiCancelRoomBtn" class="xiangqi-secondary-btn xiangqi-secondary-btn--cancel-room" type="button" disabled>解除房间</button>
          </div>

          <div class="xiangqi-board-foot">
            <div class="xiangqi-board-status-pill">
              <strong id="xiangqiMatchStatus">等待对手加入</strong>
            </div>
            <div id="xiangqiBottomCard" class="xiangqi-player-card xiangqi-player-card--footer xiangqi-player-card--red">
              <span id="xiangqiBottomSide" class="xiangqi-side">红方</span>
              <strong id="xiangqiBottomPlayer">房主</strong>
              <p id="xiangqiBottomTime">15:00</p>
            </div>
          </div>
        </section>
      </section>

      <div id="xiangqiAmountModal" class="xiangqi-amount-modal" hidden>
        <div class="xiangqi-amount-modal__backdrop" data-amount-close="true"></div>
        <section class="xiangqi-amount-sheet" role="dialog" aria-modal="true" aria-labelledby="xiangqiAmountTitle">
          <div class="xiangqi-amount-sheet__head">
            <strong id="xiangqiAmountTitle">输入金额</strong>
            <button id="xiangqiAmountCancelBtn" class="xiangqi-amount-sheet__close" type="button" aria-label="关闭">取消</button>
          </div>
          <label class="xiangqi-amount-field" for="xiangqiAmountInput">
            <span>USDT 金额</span>
            <input
              id="xiangqiAmountInput"
              class="xiangqi-amount-input"
              type="text"
              inputmode="decimal"
              enterkeyhint="done"
              autocomplete="off"
              autocapitalize="off"
              spellcheck="false"
              pattern="[0-9]*[.,]?[0-9]*"
              placeholder="请输入金额"
            />
          </label>
          <button id="xiangqiAmountConfirmBtn" class="xiangqi-room-cta" type="button">确认</button>
        </section>
      </div>

      <div id="xiangqiDrawConfirmModal" class="xiangqi-amount-modal" hidden>
        <div class="xiangqi-amount-modal__backdrop" data-draw-close="true"></div>
        <section class="xiangqi-amount-sheet xiangqi-draw-confirm-sheet" role="dialog" aria-modal="true" aria-labelledby="xiangqiDrawConfirmTitle">
          <div class="xiangqi-amount-sheet__head">
            <strong id="xiangqiDrawConfirmTitle">对手发起求和</strong>
            <button class="xiangqi-amount-sheet__close" type="button" data-draw-close="true" aria-label="关闭">取消</button>
          </div>
          <p class="xiangqi-draw-confirm-copy">是否同意本局求和？</p>
          <div class="xiangqi-draw-confirm-actions">
            <button id="xiangqiDrawConfirmRejectBtn" class="xiangqi-secondary-btn" type="button">拒绝</button>
            <button id="xiangqiDrawConfirmAcceptBtn" class="xiangqi-room-cta" type="button">同意</button>
          </div>
        </section>
      </div>

      <div id="xiangqiLedgerModal" class="xiangqi-amount-modal" hidden>
        <div class="xiangqi-amount-modal__backdrop" data-ledger-close="true"></div>
        <section class="xiangqi-amount-sheet xiangqi-ledger-sheet" role="dialog" aria-modal="true" aria-labelledby="xiangqiLedgerTitle">
          <div class="xiangqi-amount-sheet__head">
            <strong id="xiangqiLedgerTitle">资金明细</strong>
            <button id="xiangqiLedgerCloseBtn" class="xiangqi-amount-sheet__close" type="button" aria-label="关闭">关闭</button>
          </div>
          <div id="xiangqiLedgerList" class="xiangqi-ledger-list">
            <p class="xiangqi-ledger-empty">暂无资金明细</p>
          </div>
        </section>
      </div>
    </main>

    <script src="/games-config.js?v=20260322-01"></script>
    <script>
      window.ClawGamesConfig?.bootstrapGamePage?.('xiangqi');
    </script>
    <script src="/xiangqi/script.js?v=20260322-25"></script>
    <script src="/game-tip.js?v=20260321-01"></script>
  </body>
</html>
