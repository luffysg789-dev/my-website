<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Claw800 提肛大师</title>
    <meta name="description" content="Claw800 提肛大师，按下开始提肛，松开自动记录每日健康打卡。" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/tigang-master/style.css?v=3" />
  </head>
  <body>
    <main class="tigang-page" data-tigang-app>
      <section class="tigang-shell">
        <header class="tigang-header">
          <div class="tigang-header-left">
            <a class="tigang-back" href="/games.html" aria-label="返回游戏与工具大全" title="返回游戏与工具大全">
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path
                  fill="currentColor"
                  d="M15.7 5.3a1 1 0 010 1.4L10.41 12l5.29 5.3a1 1 0 01-1.42 1.4l-6-6a1 1 0 010-1.4l6-6a1 1 0 011.42 0z"
                />
              </svg>
            </a>
            <nav class="tigang-nav">
              <button class="tigang-nav__item is-active" type="button" data-tab-target="home" data-i18n="navHome">提肛</button>
              <button class="tigang-nav__item" type="button" data-tab-target="records" data-i18n="navRecords">记录</button>
            </nav>
          </div>
          <div class="tigang-language-toggle" id="tigangLanguageToggle" aria-label="语言切换">
            <button class="tigang-language-toggle__button is-active" type="button" data-language="zh">中</button>
            <button class="tigang-language-toggle__button" type="button" data-language="en">EN</button>
          </div>
        </header>

        <section class="tigang-panels">
          <section class="tigang-panel is-active" data-tab="home">
            <article class="tigang-card tigang-hero-card">
              <div class="tigang-goal-row">
                <div>
                  <p class="tigang-label" data-i18n="todayCountLabel">今日次数</p>
                  <strong id="tigangTodayCount">0</strong>
                </div>
                <div>
                  <p class="tigang-label" data-i18n="goalLabel">每日目标</p>
                  <strong id="tigangTodayGoal">5</strong>
                </div>
              </div>

              <button id="tigangActionButton" class="tigang-action-button" type="button" aria-label="开始提肛">
                <span class="tigang-action-button__timer" id="tigangTimerValue">0.0s</span>
                <span class="tigang-action-button__status" id="tigangStatusText">按住开始</span>
              </button>

              <p id="tigangReminderText" class="tigang-reminder" hidden></p>
              <p id="tigangProgressText" class="tigang-helper">今天还差 5 次达成绿色状态。</p>
            </article>

            <article class="tigang-card">
              <div class="tigang-record-head">
                <div>
                  <p class="tigang-label" data-i18n="recentLabel">最近记录</p>
                  <h2 data-i18n="recentFiveTitle">最近 5 次</h2>
                </div>
              </div>
              <div id="tigangRecentList" class="tigang-record-list"></div>
            </article>
          </section>

          <section class="tigang-panel" data-tab="records" hidden>
            <article class="tigang-card">
              <div class="tigang-record-head">
                <div>
                  <p class="tigang-label" data-i18n="historyLabel">最近记录</p>
                  <h2 data-i18n="historyTitle">打卡历史</h2>
                </div>
              </div>
              <div id="tigangRecordList" class="tigang-record-list"></div>
            </article>
          </section>
        </section>
      </section>
    </main>

    <script src="/games-config.js"></script>
    <script>
      window.ClawGamesConfig?.bootstrapGamePage?.('tigang-master');
    </script>
    <script src="/tigang-master/script.js?v=3"></script>
  </body>
</html>
