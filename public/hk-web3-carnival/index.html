<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claw800 2026 · 香港 Web3 嘉年华</title>
    <meta
      name="description"
      content="2026 · 香港 Web3 嘉年华活动汇总页，收录香港 Web3 嘉年华期间的周边活动、论坛、社交酒会与报名入口。"
    />
    <link rel="stylesheet" href="/hk-web3-carnival/style.css?v=20260418-07" />
  </head>
  <body>
    <main class="carnival-shell" data-carnival-app>
      <section class="carnival-hero" id="carnivalHero">
        <div class="carnival-hero__overlay"></div>
        <a class="carnival-hero__back" href="/games.html" aria-label="返回游戏大全">‹</a>
        <div class="carnival-hero__content">
          <p class="carnival-hero__eyebrow">NEXA收录</p>
          <div class="carnival-hero__headline">
            <h1 class="carnival-hero__title" id="carnivalHeroTitle">2026香港Web3活动大全</h1>
          </div>
          <p class="carnival-hero__description" id="carnivalHeroDescription">香港Web3嘉年华将于4月20-23日在香港会议展览中心举办</p>
          <div class="carnival-hero__meta">
            <span id="carnivalHeroDateRange">2026-04-13 - 2026-04-28</span>
            <span id="carnivalHeroTotal">91 场活动</span>
          </div>
          <div class="carnival-hero__actions">
            <a
              class="carnival-hero__download"
              href="https://www.nexaexworth.com/"
              target="_blank"
              rel="noopener noreferrer"
            >
              下载
            </a>
            <button class="carnival-hero__contact" id="carnivalContactButton" type="button">收录</button>
            <button class="carnival-hero__contact" id="carnivalShareButton" type="button">分享</button>
          </div>
          <p class="carnival-hero__hint">苹果商店搜nexa pay下载,查看实时活动,申请苹果卡,在港最方便的u卡.</p>
        </div>
      </section>

      <section class="carnival-search-panel">
        <div class="carnival-search-box">
          <label class="carnival-field carnival-field--search">
            <span class="carnival-field__label carnival-field__label--desktop">名称</span>
            <input id="carnivalSearchInput" type="search" placeholder="请输入名称" />
          </label>
        </div>
        <div class="carnival-filter-row">
          <label class="carnival-field carnival-field--filter">
            <span class="carnival-field__label carnival-field__label--desktop">时间</span>
            <select id="carnivalDateFilter"></select>
          </label>
          <label class="carnival-field carnival-field--filter">
            <span class="carnival-field__label carnival-field__label--desktop">状态</span>
            <select id="carnivalStateFilter">
              <option value="">状态</option>
              <option value="1">未开始</option>
              <option value="2">进行中</option>
              <option value="3">已结束</option>
            </select>
          </label>
          <label class="carnival-field carnival-field--filter">
            <span class="carnival-field__label carnival-field__label--desktop">类型</span>
            <select id="carnivalTypeFilter">
              <option value="">类型</option>
              <option value="1">精选活动</option>
              <option value="2">酒会社交</option>
              <option value="3">特定方向</option>
              <option value="0">其他</option>
            </select>
          </label>
        </div>
      </section>

      <section class="carnival-list-panel">
        <div class="carnival-list-panel__head">
          <h2 class="carnival-list-panel__title">活动列表</h2>
          <span class="carnival-list-panel__count" id="carnivalResultCount">0 条结果</span>
        </div>
        <div class="carnival-event-list" id="carnivalEventList"></div>
        <p class="carnival-empty" id="carnivalEmptyState" hidden>暂无数据</p>
        <div class="carnival-load-more-wrap">
          <button class="carnival-load-more" id="carnivalLoadMore" type="button">More</button>
        </div>
      </section>
    </main>

    <div class="carnival-modal" id="carnivalQrModal" hidden>
      <button class="carnival-modal__backdrop" id="carnivalQrBackdrop" type="button" aria-label="关闭联系收录二维码"></button>
      <div class="carnival-modal__dialog carnival-modal__dialog--qr" role="dialog" aria-modal="true" aria-labelledby="carnivalQrTitle">
        <img class="carnival-modal__image" src="/hk-web3-carnival/contact-qr.jpg" alt="联系收录二维码" />
        <p class="carnival-modal__title" id="carnivalQrTitle">联系收录</p>
      </div>
    </div>

    <div class="carnival-modal" id="carnivalShareModal" hidden>
      <button class="carnival-modal__backdrop" id="carnivalShareBackdrop" type="button" aria-label="关闭分享海报"></button>
      <div class="carnival-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="carnivalShareTitle">
        <img class="carnival-modal__image" src="/hk-web3-carnival/share-poster.jpg" alt="嘉年华分享海报" />
        <p class="carnival-modal__title" id="carnivalShareTitle">分享海报</p>
      </div>
    </div>

    <script src="/hk-web3-carnival/data.js?v=20260418-01"></script>
    <script src="/hk-web3-carnival/script.js?v=20260419-01"></script>
  </body>
</html>
