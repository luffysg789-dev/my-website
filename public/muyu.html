<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claw800 敲木鱼</title>
    <meta name="description" content="Claw800 敲木鱼小游戏，轻点木鱼一下，功德 +1，支持手机网页与木鱼音效。" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/game-tip.css?v=20260319-03" />
    <link rel="stylesheet" href="/muyu.css?v=20260319-03" />
  </head>
  <body>
    <main class="muyu-page">
      <section class="container">
        <div class="muyu-shell">
          <div class="muyu-header">
            <div class="muyu-header-top">
              <h2 id="gamePageTitle">敲木鱼</h2>
              <div class="muyu-toolbar">
                <a class="muyu-back" href="/games.html" aria-label="返回游戏大全" title="返回游戏大全">
                  <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path
                      fill="currentColor"
                      d="M15.7 5.3a1 1 0 010 1.4L10.41 12l5.29 5.3a1 1 0 01-1.42 1.4l-6-6a1 1 0 010-1.4l6-6a1 1 0 011.42 0z"
                    />
                  </svg>
                </a>
                <button id="muyuAutoToggleBtn" type="button" class="muyu-auto-btn">自动敲击：关</button>
              </div>
            </div>
            <p id="gamePageSubtitle" class="muyu-subtitle">轻点木鱼一下，功德 +1。</p>
          </div>

          <div class="muyu-stage">
            <div class="muyu-meritboard" aria-live="polite">
              <strong id="muyuHeroCount">0</strong>
              <span>总功德</span>
            </div>
            <button id="muyuStrikeBtn" type="button" class="muyu-wood" aria-label="敲木鱼">
              <span class="muyu-impact-ripple" aria-hidden="true"></span>
              <span class="muyu-impact-ripple muyu-impact-ripple--late" aria-hidden="true"></span>
              <span class="muyu-impact-spark" aria-hidden="true"></span>
              <span id="muyuBlessingText" class="muyu-blessing-text" aria-hidden="true">功德+1 佛祖保佑你</span>
              <span class="muyu-wood__body" aria-hidden="true">
                <img class="muyu-wood__image" src="" data-default-src="/assets/muyu-fish-fixed.webp" alt="" />
              </span>
              <span class="muyu-mallet" aria-hidden="true">
                <img class="muyu-mallet__image" src="" data-default-src="/assets/muyu-mallet-fixed.png" alt="" />
              </span>
              <span class="muyu-wood__label">敲一下，功德 +1</span>
            </button>
            <p id="muyuHint" class="muyu-hint">轻触木鱼，开始积功德。</p>
          </div>

          <div class="muyu-controls-grid">
            <div class="muyu-stat-card muyu-control-item">
              <span>今日功德</span>
              <strong id="muyuTodayCount">0</strong>
            </div>
            <button id="muyuMusicToggleBtn" type="button" class="muyu-control-btn">背景音乐：关</button>
            <button id="muyuResetBtn" type="button" class="muyu-control-btn">清零重来</button>
          </div>
        </div>
      </section>
    </main>

    <script src="/muyu.js?v=20260319-03"></script>
    <script src="/game-tip.js?v=20260319-03"></script>
  </body>
</html>
