    <script>

        },
        en: {
          htmlLang: 'en',
          titlePrefix: 'Tutorial - ',
          subTitle: 'OpenClaw ecosystem directory for AI websites',
          homeBtn: 'Home',
          skillsBtn: 'Skills',
          githubStarBtn: 'Star on GitHub',
          openSubmit: 'Submit for Free',
          submitTitle: 'Submit a Website',
          submitDesc: 'Submissions are reviewed by admins before they appear on the homepage.',
          labelName: 'Website Name',
          labelUrl: 'Website URL',
          labelDesc: 'Short Description',
          labelCategory: 'Category',
          labelSubmitter: 'Submitted By',
          labelEmail: 'Email',
          submitBtn: 'Submit for Review',
          closeSubmit: 'Close',
          submitSuccess: 'Submitted successfully. Waiting for admin review.',
          loading: 'Loading...',
          loadingFull: 'Loading full content...',
          translating: 'Translating...',
          notFound: 'Tutorial not found.',
          failed: 'Load failed. Please retry later.',
          publishedAt: 'Published At'
        }
      };

      function normalizeLang(input) {
        return String(input || '').trim() === 'en' ? 'en' : 'zh';
      }

      let currentLang = normalizeLang(localStorage.getItem('claw800_lang'));
      const translationCache = new Map(); // key: `${to}|${source}` -> translated
      const translationInflight = new Map(); // key: `${to}|${source}` -> Promise<string>
      const translatedTextNodes = new WeakMap(); // Node -> { to, source }
      let tutorialLoadToken = 0;
      let siteConfig = window.__CLAW800_BOOT__?.siteConfig || null;
      let submitModalController = null;
      let submitCategoriesCache = Array.isArray(window.__CLAW800_BOOT__?.homeCategories) ? window.__CLAW800_BOOT__.homeCategories : [];
      const faviconEl = document.getElementById('siteFavicon') || document.querySelector('link[rel~=\"icon\"]');
      const heroLogoEl = document.getElementById('heroLogo');
      const heroLogoImageEl = document.getElementById('heroLogoImage');
      const heroLogoTextEl = document.getElementById('heroLogoText');
      const heroSubtitleEl = document.getElementById('heroSubtitle');
      const homeNavBtn = document.getElementById('homeNavBtn');
      const skillsNavBtn = document.getElementById('skillsNavBtn');
      const githubStarBtn = document.getElementById('githubStarBtn');
      const openSubmitFormBtn = document.getElementById('openSubmitFormBtn');
      const langMenuBtn = document.getElementById('langMenuBtn');
      const langMenuPopup = document.getElementById('langMenuPopup');
      const footerCopyrightEl = document.getElementById('footerCopyright');
      const footerLinksEl = document.getElementById('footerLinks');
      const footerContactEl = document.getElementById('footerContact');

      function getUiLang() {
        return currentLang;
      }

      function getTranslateTarget() {
        return currentLang === 'en' ? 'en' : '';
      }

      function isProbablyUrl(text) {
        const s = String(text || '').trim();
        return /^https?:\/\/\\S+$/i.test(s);
      }

      function isProbablyEmail(text) {
        const s = String(text || '').trim();
        return /^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/.test(s);
      }

      function localizeApiError(message) {
        const raw = String(message || '').trim();
        if (!raw) return currentLang === 'en' ? 'Submission failed' : '提交失败';
        if (currentLang === 'en') return raw;
        if (raw === 'name and url required') return '请填写网站名称和网址';
        if (raw === 'invalid url') return '网址格式不正确';
        return raw;
      }

      function getSubmitTexts() {
        const dict = texts[currentLang];
        return {
          submitTitle: dict.submitTitle,
          submitDesc: dict.submitDesc,
          labelName: dict.labelName,
          labelUrl: dict.labelUrl,
          labelDesc: dict.labelDesc,
          labelCategory: dict.labelCategory,
          labelSubmitter: dict.labelSubmitter,
          labelEmail: dict.labelEmail,
          submitBtn: dict.submitBtn,
          closeSubmit: dict.closeSubmit,
          submitSuccess: dict.submitSuccess
        };
      }

      async function loadSubmitCategories() {
        try {
          const res = await fetch('/api/categories', { cache: 'no-store' });
          const data = await res.json().catch(() => ({}));
          const items = Array.isArray(data.items) ? data.items : [];
          if (items.length) {
            submitCategoriesCache = items;
            localStorage.setItem('claw800_home_categories_cache', JSON.stringify(items));
            return items;
          }
        } catch {}
        return submitCategoriesCache;
      }

      function renderHeroLogo() {
        if (!heroLogoEl || !heroLogoTextEl || !heroLogoImageEl) return;
        const title = String(siteConfig?.title || '').trim() || 'claw800.com';
        const logo = String(siteConfig?.siteLogo || '').trim();
        heroLogoEl.setAttribute('aria-label', title);
        heroLogoTextEl.textContent = title;
        if (logo) {
          heroLogoImageEl.src = logo;
          heroLogoImageEl.classList.remove('hidden');
        } else {
          heroLogoImageEl.removeAttribute('src');
          heroLogoImageEl.classList.add('hidden');
        }
      }

      function renderFooter() {
        if (!footerCopyrightEl || !footerLinksEl || !footerContactEl) return;
        const cfg = siteConfig || {};

        const copyright =
          currentLang === 'en'
            ? String(cfg.footerCopyrightEn || '').trim() || String(cfg.footerCopyrightZh || '').trim()
            : String(cfg.footerCopyrightZh || '').trim() || String(cfg.footerCopyrightEn || '').trim();
        const contact =
          currentLang === 'en'
            ? String(cfg.footerContactEn || '').trim() || String(cfg.footerContactZh || '').trim()
            : String(cfg.footerContactZh || '').trim() || String(cfg.footerContactEn || '').trim();

        footerCopyrightEl.textContent = '';
        if (copyright) {
          footerCopyrightEl.textContent = copyright;
          footerCopyrightEl.classList.remove('hidden');
        } else {
          footerCopyrightEl.classList.add('hidden');
        }

        const links = Array.isArray(cfg.footerLinks) ? cfg.footerLinks : [];
        footerLinksEl.innerHTML = '';
        if (links.length) {
          const frag = document.createDocumentFragment();
          links.slice(0, 50).forEach((it, idx) => {
            const a = document.createElement('a');
            a.href = String(it.url || '#');
            a.target = '_blank';
            a.rel = 'noopener';
            const label =
              currentLang === 'en'
                ? String(it.nameEn || '').trim() || String(it.nameZh || '').trim() || a.href
                : String(it.nameZh || '').trim() || String(it.nameEn || '').trim() || a.href;
            a.textContent = label;
            frag.appendChild(a);
            if (idx !== links.length - 1) {
              const sep = document.createElement('span');
              sep.className = 'site-footer-sep';
              sep.textContent = ' | ';
              frag.appendChild(sep);
            }
          });
          footerLinksEl.appendChild(frag);
          footerLinksEl.classList.remove('hidden');
        } else {
          footerLinksEl.classList.add('hidden');
        }

        footerContactEl.innerHTML = '';
        if (contact) {
          if (isProbablyUrl(contact)) {
            const a = document.createElement('a');
            a.href = contact;
            a.target = '_blank';
            a.rel = 'noopener';
            a.textContent = contact;
            footerContactEl.appendChild(a);
          } else if (isProbablyEmail(contact)) {
            const a = document.createElement('a');
            a.href = `mailto:${contact}`;
            a.textContent = contact;
            footerContactEl.appendChild(a);
          } else {
            footerContactEl.textContent = contact;
          }
          footerContactEl.classList.remove('hidden');
        } else {
          footerContactEl.classList.add('hidden');
        }
      }

      function renderFavicon() {
        if (!faviconEl) return;
        const icon = String(siteConfig?.icon || '').trim();
        faviconEl.href = icon || '/favicon.ico';
      }

      function t(key) {
        const uiLang = getUiLang();
        return texts[uiLang][key];
      }

      function escapeHtml(str) {
        return String(str || '')
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#039;');
      }

      function formatDate(input) {
        const d = new Date(String(input || '').replace(' ', 'T') + 'Z');
        if (Number.isNaN(d.getTime())) return String(input || '');
        const locale = currentLang === 'en' ? 'en-US' : 'zh-CN';
        return d.toLocaleString(locale, { hour12: false });
      }

      function hasCjk(text) {
        return /[\u3400-\u9FBF]/.test(String(text || ''));
      }

      function isNoTranslateNode(node) {
        const el = node?.parentElement || (node?.nodeType === 1 ? node : null);
        if (!el) return false;
        return Boolean(el.closest?.('[data-no-translate="true"]'));
      }

      async function requestTranslateBatch(texts, to) {
        const target = String(to || '').trim();
        if (!target) return new Map();
        const isCjkHeavyTarget = target === 'zh' || target === 'zh-tw' || target === 'ja' || target === 'ko';
        const unique = Array.from(new Set(texts.map((t) => String(t || '')).filter(Boolean)));
        const immediate = new Map();
        const waiters = [];
        const need = [];

        unique.forEach((src) => {
          const key = `${target}|${src}`;
          if (!hasCjk(src)) return;
          if (translationCache.has(key)) {
            immediate.set(src, translationCache.get(key));
            return;
          }
          if (translationInflight.has(key)) {
            waiters.push(
              translationInflight.get(key).then((translated) => {
                if (translated) immediate.set(src, translated);
              })
            );
            return;
          }
          need.push(src);
        });

        if (need.length) {
          let resolveBatch;
          let rejectBatch;
          const batchPromise = new Promise((resolve, reject) => {
            resolveBatch = resolve;
            rejectBatch = reject;
          });
          need.forEach((src) => {
            translationInflight.set(
              `${target}|${src}`,
              batchPromise.then((resultMap) => String(resultMap.get(src) || ''))
            );
          });
          try {
            const res = await fetch('/api/translate', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ to: target, texts: need })
            });
            const data = await res.json().catch(() => ({}));
            const resultMap = new Map();
            if (res.ok && Array.isArray(data.items)) {
              need.forEach((src, idx) => {
                const translated = String(data.items[idx] ?? '').trim();
                if (!translated) return;
                if (translated === src.trim()) return;
                if (!isCjkHeavyTarget && hasCjk(translated)) return;
                translationCache.set(`${target}|${src}`, translated);
                resultMap.set(src, translated);
              });
            }
            resolveBatch(resultMap);
          } catch {
            rejectBatch(new Error('translation failed'));
            // ignore translation failures
          } finally {
            need.forEach((src) => {
              translationInflight.delete(`${target}|${src}`);
            });
          }
        }
        if (waiters.length) {
          await Promise.allSettled(waiters);
        }
        const map = new Map();
        for (const src of unique) {
          const cached = translationCache.get(`${target}|${src}`);
          if (cached) map.set(src, cached);
          else if (immediate.has(src)) map.set(src, immediate.get(src));
        }
        return map;
      }

      function splitWhitespace(text) {
        const m = String(text || '').match(/^(\s*)([\s\S]*?)(\s*)$/);
        return [m ? m[1] : '', m ? m[2] : String(text || ''), m ? m[3] : ''];
      }

      async function translateElementTextNodes(rootEl) {
        const to = getTranslateTarget();
        if (!rootEl || !to) return;
        if (isNoTranslateNode(rootEl)) return;
        const nodes = [];
        const walker = document.createTreeWalker(rootEl, NodeFilter.SHOW_TEXT, {
          acceptNode(node) {
            if (isNoTranslateNode(node)) return NodeFilter.FILTER_REJECT;
            const already = translatedTextNodes.get(node);
            if (already && already.to === to) return NodeFilter.FILTER_REJECT;
            const raw = String(node.nodeValue || '');
            if (!raw.trim()) return NodeFilter.FILTER_REJECT;
            const parent = node.parentElement;
            if (!parent) return NodeFilter.FILTER_REJECT;
            const tag = parent.tagName;
            if (tag === 'SCRIPT' || tag === 'STYLE' || tag === 'CODE' || tag === 'PRE') return NodeFilter.FILTER_REJECT;
            return hasCjk(raw) ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_REJECT;
          }
        });

        let cur = walker.nextNode();
        while (cur) {
          nodes.push(cur);
          if (nodes.length >= 300) break; // safety cap
          cur = walker.nextNode();
        }

        const sources = nodes
          .map((n) => splitWhitespace(n.nodeValue)[1])
          .map((mid) => String(mid || '').trim())
          .filter(Boolean);
        if (!sources.length) return;

        const translatedMap = await requestTranslateBatch(sources, to);
        for (const node of nodes) {
          const [lead, mid, trail] = splitWhitespace(node.nodeValue);
          const key = String(mid || '').trim();
          const translated = translatedMap.get(key);
          if (translated) {
            node.nodeValue = `${lead}${translated}${trail}`;
            translatedTextNodes.set(node, { to, source: key });
          }
        }
      }

      function buildHtmlBlocks(html) {
        const input = String(html || '');
        if (!input) return [];
        // Try to split on safe-ish boundaries so we can append progressively.
        const tokens = input.split(/(<\/p>|<\/h[1-6]>|<\/li>|<br\s*\/?>)/gi);
        const blocks = [];
        let buf = '';
        for (const tok of tokens) {
          buf += tok;
          if (buf.length >= 12000 || /<\/p>|<\/h[1-6]>|<\/li>|<br\s*\/?>/i.test(tok)) {
            blocks.push(buf);
            buf = '';
          }
        }
        if (buf) blocks.push(buf);
        return blocks.filter(Boolean);
      }

      function renderHtmlProgressively({ html, contentEl, messageEl, token }) {
        return new Promise((resolve) => {
          const blocks = buildHtmlBlocks(html);
          contentEl.innerHTML = '';
          if (!blocks.length) return resolve();

          let idx = 0;
          messageEl.textContent = t('loadingFull');
          messageEl.className = 'message';

          const pump = () => {
            if (token !== tutorialLoadToken) return resolve();
            const start = performance.now();
            while (idx < blocks.length && performance.now() - start < 10) {
              contentEl.insertAdjacentHTML('beforeend', blocks[idx++]);
            }
            // Lazy-load images already appended.
            contentEl.querySelectorAll('img:not([loading])').forEach((img) => {
              img.setAttribute('loading', 'lazy');
              img.setAttribute('decoding', 'async');
            });
            if (idx < blocks.length) {
              requestAnimationFrame(pump);
              return;
            }
            messageEl.textContent = '';
            resolve();
          };

          requestAnimationFrame(pump);
        });
      }

      function applyLanguage() {
        const dict = texts[currentLang];

        document.documentElement.lang = dict.htmlLang;
        if (heroSubtitleEl) heroSubtitleEl.textContent = dict.subTitle;
        if (homeNavBtn) homeNavBtn.textContent = dict.homeBtn;
        if (skillsNavBtn) skillsNavBtn.textContent = dict.skillsBtn;
        if (githubStarBtn) {
          githubStarBtn.setAttribute('aria-label', dict.githubStarBtn);
          githubStarBtn.setAttribute('title', dict.githubStarBtn);
        }
        if (openSubmitFormBtn) openSubmitFormBtn.textContent = dict.openSubmit;
        submitModalController?.setTexts();
        renderHeroLogo();
        renderFooter();
        renderFavicon();
      }

      async function loadSiteConfig() {
        try {
          const res = await fetch(`/api/site-config?_=${Date.now()}`, { cache: 'no-store' });
          const data = await res.json().catch(() => ({}));
          if (res.ok && data && data.ok) {
            siteConfig = {
              title: String(data.title || '').trim(),
              subtitleZh: String(data.subtitleZh || '').trim(),
              subtitleEn: String(data.subtitleEn || '').trim(),
              icon: String(data.icon || '').trim(),
              footerCopyrightZh: String(data.footerCopyrightZh || '').trim(),
              footerCopyrightEn: String(data.footerCopyrightEn || '').trim(),
              footerContactZh: String(data.footerContactZh || '').trim(),
              footerContactEn: String(data.footerContactEn || '').trim(),
              footerLinks: Array.isArray(data.footerLinks) ? data.footerLinks : []
            };
          } else {
            siteConfig = null;
          }
        } catch {
          siteConfig = null;
        }
      }

      async function loadTutorial() {
        const token = ++tutorialLoadToken;
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        const titleEl = document.getElementById('tutorialTitle');
        const contentEl = document.getElementById('tutorialContent');
        const metaEl = document.getElementById('tutorialMeta');
        const messageEl = document.getElementById('tutorialMessage');

        if (!id) {
          messageEl.textContent = t('notFound');
          messageEl.className = 'message error';
          return;
        }

        messageEl.textContent = t('loading');
        messageEl.className = 'message';

        try {
          // 1) Load a small preview first so the user sees content almost immediately.
          const previewRes = await fetch(`/api/tutorials/${id}/preview?limit=2000`, { cache: 'no-store' });
          const previewData = await previewRes.json().catch(() => ({}));
          if (!previewRes.ok || !previewData.item) {
            messageEl.textContent = t('notFound');
            messageEl.className = 'message error';
            return;
          }
          const previewItem = previewData.item;
          document.title = `${t('titlePrefix')}${previewItem.title}`;
          titleEl.textContent = previewItem.title;
          metaEl.textContent = `${t('publishedAt')}：${formatDate(previewItem.created_at)}`;

          const previewText = String(previewData.previewText || '').trim();
          if (previewText) {
            contentEl.innerHTML = '';
            const pre = document.createElement('pre');
            pre.className = 'tutorial-preview';
            pre.textContent = previewText;
            contentEl.appendChild(pre);
          }

          // 2) Fetch full content in background, then progressively render it.
          const fullRes = await fetch(`/api/tutorials/${id}`, { cache: 'no-store' });
          const fullData = await fullRes.json().catch(() => ({}));
          if (!fullRes.ok || !fullData.item) {
            // Keep preview, but show error.
            messageEl.textContent = t('failed');
            messageEl.className = 'message error';
            return;
          }
          const item = fullData.item;

          await renderHtmlProgressively({ html: item.content, contentEl, messageEl, token });

          const to = getTranslateTarget();
          if (to) {
            const runTranslate = async () => {
              try {
                if (token !== tutorialLoadToken) return;
                messageEl.textContent = t('translating');
                messageEl.className = 'message';
                const rawTitle = String(item.title || '');
                const titleMap = await requestTranslateBatch([rawTitle], to);
                const translatedTitle = titleMap.get(rawTitle);
                if (translatedTitle && token === tutorialLoadToken) {
                  document.title = `${t('titlePrefix')}${translatedTitle}`;
                  titleEl.textContent = translatedTitle;
                }
                if (token !== tutorialLoadToken) return;
                await translateElementTextNodes(document.querySelector('main'));
              } finally {
                if (token === tutorialLoadToken) messageEl.textContent = '';
              }
            };
            if (typeof requestIdleCallback === 'function') {
              requestIdleCallback(() => runTranslate(), { timeout: 1000 });
            } else {
              setTimeout(() => runTranslate(), 0);
            }
          }
        } catch {
          titleEl.textContent = '';
          contentEl.innerHTML = '';
          metaEl.textContent = '';
          messageEl.textContent = t('failed');
          messageEl.className = 'message error';
        }
      }

      document.getElementById('tutorialToTopBtn').addEventListener('click', () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
      document.getElementById('tutorialToBottomBtn').addEventListener('click', () => {
        window.scrollTo({ top: document.documentElement.scrollHeight, behavior: 'smooth' });
      });

      function openLangMenu() {
        if (!langMenuPopup || !langMenuBtn) return;
        langMenuPopup.classList.remove('hidden');
        langMenuBtn.setAttribute('aria-expanded', 'true');
      }

      function closeLangMenu() {
        if (!langMenuPopup || !langMenuBtn) return;
        langMenuPopup.classList.add('hidden');
        langMenuBtn.setAttribute('aria-expanded', 'false');
      }

      function toggleLangMenu() {
        if (!langMenuPopup) return;
        if (langMenuPopup.classList.contains('hidden')) openLangMenu();
        else closeLangMenu();
      }

      function setLanguage(lang) {
        currentLang = normalizeLang(lang);
        localStorage.setItem('claw800_lang', currentLang);
        applyLanguage();
        loadTutorial();
      }

      if (langMenuBtn) {
        langMenuBtn.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          toggleLangMenu();
        });
      }

      if (langMenuPopup) {
        langMenuPopup.addEventListener('click', (e) => {
          const btn = e.target?.closest?.('button[data-lang]');
          if (!btn) return;
          const lang = String(btn.getAttribute('data-lang') || '');
          setLanguage(lang);
          closeLangMenu();
        });
      }

      document.addEventListener('click', (e) => {
        if (!langMenuPopup || !langMenuBtn) return;
        const target = e.target;
        if (target === langMenuBtn || langMenuBtn.contains(target)) return;
        if (langMenuPopup.contains(target)) return;
        closeLangMenu();
      });

      (async () => {
        submitModalController = window.initSubmitModal?.({
          getTexts: getSubmitTexts,
          getCategories: loadSubmitCategories,
          categoryLabel: (item) => String(item?.category || '').trim(),
          localizeApiError
        }) || null;
        await loadSiteConfig();
        applyLanguage();
        submitModalController?.refreshCategories();
        loadTutorial();
      })();
    </script>
  </body>
</html>
